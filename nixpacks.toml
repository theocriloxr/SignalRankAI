# ──────────────────────────────────────────────────────────────────────────────
# Railway nixpacks config — optimised for the 500 MB hobby tier
# Memory strategy: venv isolation + malloc tuning + minimal system packages
# ──────────────────────────────────────────────────────────────────────────────

[phases.setup]
# gcc required for psycopg2 / cryptography native extensions
nixPkgs = ["python311", "gcc", "libffi", "openssl"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip --quiet",
  "/opt/venv/bin/pip install -r requirements.txt --quiet --no-cache-dir",
]

# [phases.build] — Alembic migrations intentionally removed from build phase.
# Build containers do not have access to runtime DATABASE_URL, so running
# "alembic upgrade head" here would either fail silently (no DB) or target the
# wrong database.  Migrations are applied at runtime inside db.auto_ops
# (run_startup_ops → alembic upgrade head) which is called from the FastAPI
# lifespan in railway_main.py.

[start]
# Environment variables (MALLOC_ARENA_MAX, PYTHONMALLOC, PYTHONDONTWRITEBYTECODE,
# PYTHONUNBUFFERED) are already injected via the [variables] section below.
# Do NOT prefix the cmd with VAR=value assignments: Railway may exec the command
# directly (non-shell), which would treat the first token as the executable name
# and produce "The executable 'MALLOC_ARENA_MAX=2' could not be found."
# Runs railway_main:app (FastAPI + engine + worker + Telegram webhook) via uvicorn.
# main.py is NOT used here because nixpacks.toml [start] is authoritative on Railway
# with the Nixpacks builder and must start the full monolith (not just the engine).
cmd = "exec /opt/venv/bin/python -m uvicorn railway_main:app --host 0.0.0.0 --port ${PORT:-8000}"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
MALLOC_ARENA_MAX = "2"
PYTHONMALLOC = "malloc"
